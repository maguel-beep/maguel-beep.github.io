<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --black: #06050a;
            --dark: #0e0c14;
            --dark-card: #13111a;
            --dark-border: #1e1b28;
            --gold: #c9a84c;
            --gold-light: #e5c97a;
            --gold-dim: #7a6030;
            --white: #f5f0e8;
            --white-dim: #bdb098;
            --muted: #6b6478;
            --accent-hombre: #1a2a3a;
            --accent-mujer: #3a1a2a;
            --accent-nicho: #1a3a2a;
            --accent-arabe: #2a1a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6,5,10,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
            padding: 1rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            color: var(--gold-light);
        }

        .header-brand span { color: var(--gold); font-size: 0.7rem; }

        .header-sub {
            font-family: 'Raleway', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 5rem 2rem 4rem;
            border-bottom: 1px solid rgba(201,168,76,0.1);
            background: radial-gradient(ellipse at center, rgba(201,168,76,0.04) 0%, transparent 70%);
        }

        .hero-pre {
            font-family: 'Raleway', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.5em;
            color: var(--gold-dim);
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 400;
            color: var(--white);
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .hero-title em {
            color: var(--gold-light);
            font-style: italic;
        }

        .hero-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 1.5rem auto;
        }

        /* FILTROS */
        .filters {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            padding: 2rem 3rem;
            border-bottom: 1px solid rgba(201,168,76,0.08);
        }

        .filter-btn {
            font-family: 'Raleway', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.45rem 1.1rem;
            border: 1px solid rgba(201,168,76,0.25);
            background: transparent;
            color: var(--white-dim);
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--gold);
            color: var(--black);
            border-color: var(--gold);
        }

        /* GRID PERFUMES */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1px;
            background: rgba(201,168,76,0.08);
            padding: 0;
        }

        .perfume-card {
            background: var(--dark);
            padding: 2rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .perfume-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px;
            height: 100%;
            background: var(--gold-dim);
            transition: background 0.3s;
        }

        .perfume-card:hover {
            background: var(--dark-card);
            transform: translateY(-2px);
            z-index: 1;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .perfume-card:hover::before {
            background: var(--gold);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-category {
            font-family: 'Raleway', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold-dim);
            padding: 0.3rem 0.7rem;
            border: 1px solid rgba(201,168,76,0.2);
        }

        .card-pg {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 700;
        }

        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .card-brand {
            font-family: 'Raleway', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .card-gender {
            display: inline-block;
            font-family: 'Raleway', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            margin-bottom: 1.2rem;
        }

        .card-gender.hombre { background: rgba(26,42,58,0.8); color: #7ab3d4; border: 1px solid rgba(122,179,212,0.3); }
        .card-gender.mujer  { background: rgba(58,26,42,0.8); color: #d47aaa; border: 1px solid rgba(212,122,170,0.3); }
        .card-gender.unisex { background: rgba(30,27,40,0.8); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.3); }

        .card-divider {
            height: 1px;
            background: rgba(201,168,76,0.1);
            margin: 1rem 0;
        }

        .card-notes-label {
            font-family: 'Raleway', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.7rem;
        }

        .card-notes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .note-tag {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            color: var(--white-dim);
            padding: 0.2rem 0.6rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            transition: all 0.2s;
        }

        .perfume-card:hover .note-tag {
            border-color: rgba(201,168,76,0.2);
            color: var(--white);
        }

        /* SECTION LABELS */
        .section-label {
            padding: 3rem 3rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .section-label h2 {
            font-family: 'Playfair Display', serif;
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--gold-dim);
            white-space: nowrap;
        }

        .section-label-line {
            flex: 1;
            height: 1px;
            background: rgba(201,168,76,0.15);
        }

        .section-count {
            font-family: 'Raleway', sans-serif;
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 4rem 2rem;
            border-top: 1px solid rgba(201,168,76,0.1);
            margin-top: 0;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            letter-spacing: 0.3em;
            color: var(--gold-light);
            margin-bottom: 0.5rem;
        }

        .footer-copy {
            font-family: 'Raleway', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* SEARCH */
        .search-wrap {
            padding: 0 3rem 2rem;
            display: flex;
            justify-content: center;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(201,168,76,0.2);
            color: var(--white);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input::placeholder { color: var(--muted); font-style: italic; }
        .search-input:focus { border-color: var(--gold); }

        .hidden { display: none !important; }
    </style>
</head>

let activeFilter = 'todos';

function getGenderClass(g) {
    if (g === 'HOMBRE') return 'hombre';
    if (g === 'MUJER') return 'mujer';
    return 'unisex';
}

function renderCards(list) {
    const grid = document.getElementById('catalogGrid');
    if (list.length === 0) {
        grid.innerHTML = '<div style="padding:4rem;text-align:center;color:var(--muted);font-family:Cormorant Garamond,serif;font-size:1.2rem;font-style:italic;grid-column:1/-1;">No se encontraron fragancias</div>';
        return;
    }
    grid.innerHTML = list.map(p => `
        <div class="perfume-card" data-genero="${p.genero}" data-categoria="${p.categoria}">
            <div class="card-top">
                <span class="card-category">${p.categoria}</span>
                <span class="card-pg">${p.pg}</span>
            </div>
            <div class="card-name">${p.nombre}</div>
            <div class="card-brand">${p.marca}</div>
            <span class="card-gender ${getGenderClass(p.genero)}">${p.genero}</span>
            <div class="card-divider"></div>
            <div class="card-notes-label">Notas olfativas</div>
            <div class="card-notes">
                ${p.notas.map(n => `<span class="note-tag">${n}</span>`).join('')}
            </div>
        </div>
    `).join('');
}

function filterBy(filter) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let list = perfumes;
    if (activeFilter !== 'todos') {
        list = list.filter(p =>
            p.genero === activeFilter ||
            p.categoria.toUpperCase().includes(activeFilter.toUpperCase())
        );
    }
    if (q) {
        list = list.filter(p =>
            p.nombre.toLowerCase().includes(q) ||
            p.marca.toLowerCase().includes(q) ||
            p.notas.some(n => n.toLowerCase().includes(q)) ||
            p.categoria.toLowerCase().includes(q) ||
            p.pg.toLowerCase().includes(q)
        );
    }
    renderCards(list);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

renderCards(perfumes);
