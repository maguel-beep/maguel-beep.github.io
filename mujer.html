let activeFilter = 'todos';

function renderCards(list) {
    const grid = document.getElementById('catalogGrid');
    if (list.length === 0) {
        grid.innerHTML = '<div style="padding:4rem;text-align:center;color:var(--muted);font-family:Cormorant Garamond,serif;font-size:1.2rem;font-style:italic;grid-column:1/-1;">No se encontraron fragancias</div>';
        return;
    }
    grid.innerHTML = list.map(p => `
        <div class="perfume-card">
            <div class="card-top">
                <span class="card-category">${p.categoria}</span>
                <span class="card-pg">${p.pg}</span>
            </div>
            <div class="card-name">${p.nombre}</div>
            <div class="card-brand">${p.marca}</div>
            <div class="card-divider"></div>
            <div class="card-notes-label">Notas olfativas</div>
            <div class="card-notes">${p.notas.map(n => `<span class="note-tag">${n}</span>`).join('')}</div>
        </div>
    `).join('');
}

function filterBy(filter, e) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let list = perfumes;
    if (activeFilter !== 'todos') {
        list = list.filter(p => p.categoria.toUpperCase().includes(activeFilter.toUpperCase()));
    }
    if (q) {
        list = list.filter(p =>
            p.nombre.toLowerCase().includes(q) ||
            p.marca.toLowerCase().includes(q) ||
            p.notas.some(n => n.toLowerCase().includes(q)) ||
            p.categoria.toLowerCase().includes(q) ||
            p.pg.toLowerCase().includes(q)
        );
    }
    renderCards(list);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
renderCards(perfumes);
</script>
